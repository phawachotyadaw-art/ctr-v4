<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CTR v4 • HRD Panel</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="ctr.js"></script>
</head>
<body class="hr-theme">
  <header class="topbar">
    <a class="back" href="index.html">← Home</a>
    <div class="brand">HRD Panel</div>
  </header>

  <main class="wrap">
    <section class="card">
      <h3>เข้าสู่ระบบ HRD</h3>
      <div class="row">
        <input id="pin" class="input" type="password" placeholder="PIN (เริ่มต้น 1234)">
        <button class="btn" onclick="alert('เวอร์ชันเต็มจะตรวจ PIN จาก SharePoint (Admin List)')">ยืนยัน</button>
      </div>
    </section>

    <section class="grid-2">
      <div class="card">
        <h3>Trainers</h3>
        <button class="btn ghost" onclick="alert('เวอร์ชันเต็มจะ โหลด/เพิ่ม/แก้ ไอเท็ม ใน SharePoint')">เปิด</button>
      </div>
      <div class="card">
        <h3>Courses</h3>
        <button class="btn ghost" onclick="alert('เวอร์ชันเต็มจะ โหลด/เพิ่ม/แก้ ไอเท็ม ใน SharePoint')">เปิด</button>
      </div>
      <div class="card">
        <h3>Sessions</h3>
        <button class="btn ghost" onclick="alert('เวอร์ชันเต็มจะ โหลด/เพิ่ม/แก้ ไอเท็ม ใน SharePoint')">เปิด</button>
      </div>
      <div class="card">
        <h3>Bookings</h3>
        <button class="btn ghost" onclick="alert('เวอร์ชันเต็มจะ อนุมัติ Booking → สร้าง Session')">เปิด</button>
      </div>
      <div class="card">
        <h3>Ratings</h3>
        <button class="btn ghost" onclick="alert('เวอร์ชันเต็มจะ โหลด/วิเคราะห์ Rating')">เปิด</button>
      </div>
      <div class="card">
        <h3>Admin (PIN / Backup)</h3>
        <button class="btn ghost" onclick="alert('เวอร์ชันเต็มจะ เปลี่ยน PIN + Export/Import JSON')">เปิด</button>
      </div>
    </section>
  </main>

  <footer class="footer">© CTR v4 • HRD (Template)</footer>
</body>
</html>
