<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CTR v4 • Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="hr-theme">
  <header class="topbar">
    <a class="back" href="index.html">← Home</a>
    <div class="brand">Booking</div>
  </header>

  <main class="wrap">
    <form class="form" onsubmit="alert('เวอร์ชันเต็มจะบันทึกลง SharePoint (Bookings)');return false;">
      <label>ชื่อผู้ขอ <input class="input" required></label>
      <label>แผนก <input class="input" required></label>
      <label>หลักสูตร <input class="input" placeholder="หรือปรับเป็น dropdown ในเวอร์ชันเต็ม"></label>
      <label>Trainer <input class="input" placeholder="หรือปรับเป็น dropdown ในเวอร์ชันเต็ม"></label>
      <label>วันที่ <input class="input" type="date"></label>
      <label>ผู้เข้าอบรม (คน) <input class="input" type="number" min="1" value="10"></label>
      <label>ติดต่อ <input class="input"></label>
      <button class="btn" type="submit">ส่งคำขอ</button>
    </form>
  </main>

  <footer class="footer">© CTR v4 • Booking (Template)</footer>
</body>
</html>
